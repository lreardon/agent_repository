name: PR Check

on:
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: us-west1

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: api_user
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: agent_registry_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          ENV: test
          DATABASE_URL: postgresql+asyncpg://api_user:localdev@localhost:5432/agent_registry_test
          TEST_DATABASE_URL: postgresql+asyncpg://api_user:localdev@localhost:5432/agent_registry_test
          REDIS_URL: redis://localhost:6379/0
          PLATFORM_SIGNING_KEY: test-key
          REQUIRE_AGENT_CARD: "false"
        run: pytest --tb=short -q

  terraform-plan:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment: [staging, production]

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT_EMAIL }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Select workspace
        working-directory: infra
        run: terraform workspace select ${{ matrix.environment }} || terraform workspace new ${{ matrix.environment }}

      - name: Terraform Plan
        id: plan
        working-directory: infra
        run: |
          terraform plan -var-file="${{ matrix.environment }}.tfvars" -no-color -input=false 2>&1 | tee /tmp/plan.txt
          echo "plan<<PLAN_EOF" >> "$GITHUB_OUTPUT"
          tail -50 /tmp/plan.txt >> "$GITHUB_OUTPUT"
          echo "PLAN_EOF" >> "$GITHUB_OUTPUT"

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.plan }}`;
            const body = `### Terraform Plan — \`${{ matrix.environment }}\`\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });
