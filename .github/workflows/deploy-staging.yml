name: Deploy to Staging

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: us-west1
  SERVICE: agent-registry-staging
  REPO: agent-registry
  TF_VAR_FILE: staging.tfvars

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: api_user
          POSTGRES_PASSWORD: localdev
          POSTGRES_DB: agent_registry_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          ENV: test
          DATABASE_URL: postgresql+asyncpg://api_user:localdev@localhost:5432/agent_registry_test
          TEST_DATABASE_URL: postgresql+asyncpg://api_user:localdev@localhost:5432/agent_registry_test
          REDIS_URL: redis://localhost:6379/0
          PLATFORM_SIGNING_KEY: test-key
          REQUIRE_AGENT_CARD: "false"
          ADMIN_PATH_PREFIX: "/ops-ci-test"
        run: pytest --tb=short -q

  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.build.outputs.image_sha }}
      image_latest: ${{ steps.build.outputs.image_latest }}

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE_SHA="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/api:${GITHUB_SHA}"
          IMAGE_LATEST="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/api:latest"
          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "image_sha=$IMAGE_SHA" >> "$GITHUB_OUTPUT"
          echo "image_latest=$IMAGE_LATEST" >> "$GITHUB_OUTPUT"

  infra:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT_EMAIL }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Select workspace
        working-directory: infra
        run: terraform workspace select staging || terraform workspace new staging

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -var-file="${TF_VAR_FILE}" -out=tfplan -input=false

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -input=false tfplan

  deploy:
    needs: [build, infra]
    if: ${{ always() && needs.build.result == 'success' && (needs.infra.result == 'success' || needs.infra.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          image: ${{ needs.build.outputs.image_sha }}
          region: ${{ env.REGION }}

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe ${SERVICE} --region=${REGION} --format='value(status.url)')
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${URL}/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check returned $STATUS"
            curl -s "${URL}/health" | jq .
            exit 1
          fi
          echo "✅ Health check passed"

  deploy-docs:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          SITE_ID="${PROJECT_ID}-staging"
          sed -i "s/\\\$PROJECT_ID/${PROJECT_ID}/g" .firebaserc
          sed -i 's/\$FIREBASE_SITE_ID/'"${SITE_ID}"'/g' firebase.json
          firebase deploy --only hosting --project="${PROJECT_ID}"
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
