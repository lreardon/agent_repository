name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (must have passed staging)"
        required: true
        type: string
      skip_infra:
        description: "Skip Terraform apply (app-only deploy)"
        required: false
        type: boolean
        default: false

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: us-west1
  SERVICE: agent-registry-api-production
  REPO: agent-registry
  TF_VAR_FILE: production.tfvars

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      image_sha: ${{ steps.build.outputs.image_sha }}
      image_latest: ${{ steps.build.outputs.image_latest }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and push image
        id: build
        run: |
          IMAGE_SHA="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/api:${{ inputs.sha }}"
          IMAGE_LATEST="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/api:latest"
          docker build -t "$IMAGE_SHA" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"
          echo "image_sha=$IMAGE_SHA" >> "$GITHUB_OUTPUT"
          echo "image_latest=$IMAGE_LATEST" >> "$GITHUB_OUTPUT"

  infra:
    needs: build
    if: ${{ !inputs.skip_infra }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT_EMAIL }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Select workspace
        working-directory: infra
        run: terraform workspace select production || terraform workspace new production

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -var-file="${TF_VAR_FILE}" -out=tfplan -input=false

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -input=false tfplan

  deploy:
    needs: [build, infra]
    if: ${{ always() && (needs.infra.result == 'success' || needs.infra.result == 'skipped') && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${SERVICE} \
            --image=${{ needs.build.outputs.image_sha }} \
            --region=${REGION} \
            --port=8000 \
            --verbosity=debug

      - name: Verify deployment
        run: |
          echo "=== Service details ==="
          gcloud run services describe ${SERVICE} --region=${REGION} --format=yaml
          echo "=== Latest revision ==="
          gcloud run revisions list --service=${SERVICE} --region=${REGION} --format="table(name,status.conditions.status,image)" --limit=3

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe ${SERVICE} --region=${REGION} --format='value(status.url)')
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${URL}/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check returned $STATUS"
            curl -s "${URL}/health" | jq .
            exit 1
          fi
          echo "✅ Health check passed"

  deploy-docs:
    needs: deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.CI_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          SITE_ID="${PROJECT_ID}-production"
          sed -i "s/\\\$PROJECT_ID/${PROJECT_ID}/g" .firebaserc
          sed -i 's/\$FIREBASE_SITE_ID/'"${SITE_ID}"'/g' firebase.json
          firebase deploy --only hosting --project="${PROJECT_ID}"
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
